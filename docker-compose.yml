services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gympulse-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DevPwd_ChangeMe123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - gympulse-db-data:/var/opt/mssql

volumes:
  gympulse-db-data:
